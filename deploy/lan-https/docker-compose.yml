# Local / LAN cross-device debugging — one command to rebuild + run over HTTPS.
# (Clipboard APIs need a secure context, so plain http://<lan-ip> can't sync.)
#
#   cd deploy/lan-https
#   ./setup.sh                     # once: mkcert CA + a cert for your LAN IP -> ./certs
#   docker compose up --build -d   # rebuild the image + run; re-run to pick up code changes
#   docker compose logs -f         # tail logs
#   docker compose down            # stop
#
# Then open https://<lan-ip>:3443 on every device (install the root CA once — see README.md).
#
# A private VPS reached by IP can use this same file. A public VPS with a domain
# should use ../docker-compose.yml instead (Caddy + automatic Let's Encrypt).
services:
  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: uniclip:dev
    environment:
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Room URLs survive restarts (metadata only — never frames/keys/history).
      ROOM_DB_PATH: /data/rooms.db
      # Native HTTPS using the mkcert cert ./setup.sh wrote into ./certs.
      TLS_CERT: /certs/relay.crt
      TLS_KEY: /certs/relay.key
    ports:
      - "${HTTPS_PORT:-3443}:3000"
    volumes:
      - ./certs:/certs:ro # generated by ./setup.sh (gitignored — never committed)
      - room_data:/data
    restart: unless-stopped

volumes:
  room_data:
