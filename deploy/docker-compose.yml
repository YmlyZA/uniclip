# Production deploy for a VPS: the relay behind Caddy with automatic HTTPS.
#
#   cd deploy
#   DOMAIN=clip.example.com docker compose up -d --build
#
# Point clip.example.com's A/AAAA record at this host first. Caddy then obtains
# and renews a Let's Encrypt certificate for $DOMAIN with no further config.
# The relay keeps clipboard frames/keys/history only in memory; it persists just
# room *metadata* (id, mode, expiresAt, backfillEnabled, createdAt) to a small
# SQLite file on the room_data volume so room URLs survive a redeploy. GC by
# idle/age still applies.
services:
  relay:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: uniclip:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      LOG_LEVEL: info
      ROOM_DB_PATH: /data/rooms.db # persists room URLs across restarts (metadata only)
    volumes:
      - room_data:/data # room metadata DB — never holds frames, keys, or history
    expose:
      - "3000" # internal to the compose network only; never published to the host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80" # required for the ACME HTTP challenge + HTTP->HTTPS redirect
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN, e.g. DOMAIN=clip.example.com docker compose up -d}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists issued certs across restarts — do not delete
      - caddy_config:/config
    depends_on:
      - relay

volumes:
  caddy_data:
  caddy_config:
  room_data:
